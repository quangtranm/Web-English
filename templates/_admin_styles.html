<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');

    :root {
        /* --- Premium Color Palette (Teal & Slate) --- */
        --primary: #0D9488;
        --primary-dark: #0F766E;
        --primary-light: #2DD4BF;
        --primary-soft: rgba(13, 148, 136, 0.1);
        
        --secondary: #6366F1;
        --secondary-soft: rgba(99, 102, 241, 0.1);
        
        --bg-main: #F8FAFC;
        --bg-card: #FFFFFF;
        --bg-sidebar: #FFFFFF;
        
        --text-main: #0F172A;
        --text-muted: #64748B;
        --text-faint: #94A3B8;
        
        --border: #E2E8F0;
        --border-light: #F1F5F9;
        
        --success: #10B981;
        --warning: #F59E0B;
        --danger: #EF4444;
        
        --r-xl: 24px;
        --r-lg: 16px;
        --r-md: 12px;
        --r-sm: 8px;
        
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
        --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
        --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.02);
        
        --sidebar-w: 280px;
        --topbar-h: 72px;
        --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg-main);
        color: var(--text-main);
        display: flex;
        height: 100vh;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
    }

    /* ════════ LAYOUT ════════ */
    .sidebar {
        width: var(--sidebar-w);
        background: var(--bg-sidebar);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        z-index: 100;
        transition: transform 0.3s var(--ease);
    }

    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        position: relative;
    }

    .top-bar {
        height: var(--topbar-h);
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 2.5rem;
        z-index: 50;
        flex-shrink: 0;
    }

    .content-area {
        flex: 1;
        overflow-y: auto;
        padding: 2.5rem;
        scroll-behavior: smooth;
    }

    /* ════════ SIDEBAR ════════ */
    .sidebar-header {
        padding: 2.5rem 2rem;
    }
    .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 1rem;
        text-decoration: none;
        color: var(--text-main);
    }
    .brand-icon {
        width: 44px; height: 44px; border-radius: 14px;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        display: grid; place-items: center; color: #fff; font-size: 1.25rem;
        box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2);
    }
    .brand-text h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.03em; }
    .brand-text span { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--primary); letter-spacing: 0.1em; }

    .sidebar-nav { padding: 0 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; flex: 1; }
    .nav-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--text-faint); padding: 1.5rem 1rem 0.5rem; letter-spacing: 0.1em; }
    .nav-item {
        display: flex; align-items: center; gap: 1rem;
        padding: 0.9rem 1.25rem; border-radius: var(--r-md);
        text-decoration: none; color: var(--text-muted);
        font-weight: 600; font-size: 0.95rem; transition: all 0.25s var(--ease);
    }
    .nav-item i { font-size: 1.15rem; width: 24px; text-align: center; color: var(--text-faint); transition: inherit; }
    .nav-item:hover { background: var(--border-light); color: var(--primary); }
    .nav-item:hover i { color: var(--primary); }
    .nav-item.active { background: var(--primary-soft); color: var(--primary); }
    .nav-item.active i { color: var(--primary); }

    .sidebar-footer { padding: 1.5rem 2rem; border-top: 1px solid var(--border-light); }
    .logout-btn { 
        display: flex; align-items: center; gap: 0.75rem; color: var(--danger); 
        text-decoration: none; font-weight: 700; font-size: 0.9rem; transition: 0.2s;
    }
    .logout-btn:hover { opacity: 0.8; transform: translateX(4px); }

    /* ════════ CARDS ════════ */
    .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--r-xl);
        padding: 2rem;
        box-shadow: var(--shadow-sm);
        transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
        position: relative;
        overflow: hidden;
    }
    .card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .card-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
    .card-icon {
        width: 48px; height: 48px; border-radius: 14px;
        display: grid; place-items: center; font-size: 1.25rem;
    }
    .icon-p { background: var(--primary-soft); color: var(--primary); }
    .icon-s { background: var(--secondary-soft); color: var(--secondary); }
    .card-title h3 { font-size: 1.1rem; font-weight: 800; color: var(--text-main); }
    .card-title p { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }

    /* ════════ TABLES ════════ */
    .table-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-xl); overflow: hidden; box-shadow: var(--shadow-sm); }
    .table-header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .table-title { font-size: 1.1rem; font-weight: 800; display: flex; align-items: center; gap: 0.75rem; }
    .badge-count { background: var(--primary-soft); color: var(--primary); font-size: 0.75rem; font-weight: 800; padding: 4px 10px; border-radius: 99px; }

    table { width: 100%; border-collapse: collapse; }
    thead th { 
        background: var(--bg-main); padding: 1.25rem 2rem; text-align: left; 
        font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--text-faint); 
        letter-spacing: 0.05em; border-bottom: 1px solid var(--border); 
    }
    tbody td { padding: 1.25rem 2rem; border-bottom: 1px solid var(--border-light); font-size: 0.95rem; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.2s var(--ease); }
    tbody tr:hover { background: var(--bg-main); }

    /* ════════ FORMS ════════ */
    .form-group { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.5rem; }
    .form-group label { font-size: 0.85rem; font-weight: 700; color: var(--text-main); }
    .form-input {
        width: 100%; padding: 0.85rem 1.25rem; border: 2px solid var(--border-light);
        border-radius: var(--r-md); font-size: 0.95rem; font-weight: 600;
        transition: all 0.2s var(--ease); font-family: inherit;
    }
    .form-input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px var(--primary-soft); }
    
    .btn {
        display: inline-flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1.5rem;
        border-radius: var(--r-md); font-weight: 700; font-size: 0.9rem; border: none; cursor: pointer;
        transition: all 0.25s var(--ease); text-decoration: none;
    }
    .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2); }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(13, 148, 136, 0.3); }
    .btn-ghost { background: var(--bg-main); color: var(--text-muted); border: 1.5px solid var(--border); }
    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }

    /* ════════ UTILS ════════ */
    .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; }
    .badge-primary { background: var(--primary-soft); color: var(--primary); }
    .badge-success { background: #DCFCE7; color: #15803D; }
    .badge-danger { background: #FEE2E2; color: #B91C1C; }

    .action-btn { width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; border: none; cursor: pointer; transition: 0.2s; font-size: 1rem; }
    .btn-edit { background: var(--bg-main); color: var(--text-muted); }
    .btn-edit:hover { background: var(--primary-soft); color: var(--primary); }
    .btn-del { background: #FEF2F2; color: var(--danger); }
    .btn-del:hover { background: var(--danger); color: #fff; }

    /* ════════ FLASH MESSAGES ════════ */
    .flash {
        padding: 1.25rem 2rem; border-radius: var(--r-md); margin-bottom: 2rem;
        font-weight: 700; font-size: 0.95rem; display: flex; align-items: center; gap: 1rem;
        animation: slideIn 0.4s var(--ease) both;
    }
    .flash-success { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; }
    .flash-error { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    /* ════════ MODALS ════════ */
    .modal-overlay {
        position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center;
        z-index: 1000; padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
        background: #fff; border-radius: var(--r-xl); width: 100%; max-width: 600px;
        box-shadow: var(--shadow-lg); overflow: hidden; animation: modalIn 0.3s var(--ease) both;
    }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-header { padding: 2rem; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
    .modal-body { padding: 2rem; max-height: 70vh; overflow-y: auto; }
    .modal-footer { padding: 1.5rem 2rem; border-top: 1px solid var(--border-light); display: flex; justify-content: flex-end; gap: 1rem; background: var(--bg-main); }

    /* Responsive */
    @media (max-width: 1000px) {
        .sidebar { position: fixed; transform: translateX(-100%); }
        .sidebar.open { transform: translateX(0); }
    }

    .mob-toggle {
        display: none; position: fixed; bottom: 2rem; right: 2rem; z-index: 500;
        width: 64px; height: 64px; border-radius: 50%; background: var(--primary);
        color: #fff; border: none; box-shadow: 0 8px 24px rgba(13, 148, 136, 0.3);
        align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer;
    }
    @media (max-width: 1000px) { .mob-toggle { display: flex; } }
</style>
