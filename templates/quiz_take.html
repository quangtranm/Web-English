<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm bài trắc nghiệm - LingoCards</title>    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% include '_head_fonts.html' %}

    <style>
        :root {
            --primary: #0D9488;
            --primary-dark: #0F766E;
            --secondary: #14B8A6;
            --gradient-primary: linear-gradient(135deg, #0D9488 0%, #0F766E 100%);
            --shadow-primary: 0 10px 25px rgba(13, 148, 136, 0.2);
            --surface: #ffffff;
            --border: #E5E7EB;
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --text-muted: #9CA3AF;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 28px;
            --radius-3xl: 32px;
            --radius-md: 12px;
            --transition-base: 0.2s ease;
            --transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-fast: 0.15s ease;
            --success: #059669;
            --success-bg: #F0FDFA;
            --danger: #DC2626;
            --error-bg: #FEF2F2;
            --gradient-success: linear-gradient(135deg, #059669 0%, #10B981 100%);
            --gradient-danger: linear-gradient(135deg, #DC2626 0%, #EF4444 100%);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background: #F9FAFB;
        }

        .quiz-container {
            max-width: 800px;
            width: 100%;
            background: var(--surface);
            border-radius: var(--radius-3xl);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: slideInUp 0.6s var(--transition-smooth);
        }

        .quiz-header {
            background: var(--gradient-primary);
            color: white;
            padding: 2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .quiz-info h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0 0 0.3rem 0;
            line-height: 1.2;
        }

        .quiz-info p {
            margin: 0;
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .quiz-progress {
            text-align: right;
            background: rgba(255, 255, 255, 0.15);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            min-width: 100px;
        }

        .quiz-progress .current {
            font-size: 2rem;
            font-weight: 800;
            display: block;
        }

        .quiz-progress .total {
            font-size: 0.95rem;
            opacity: 0.85;
        }

        .quiz-body {
            padding: 2.75rem 2.5rem;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 2.25rem;
            line-height: 1.6;
            color: var(--text-primary);
        }

        .options-grid {
            display: grid;
            gap: 1.25rem;
        }

        .option-btn {
            width: 100%;
            padding: 1.35rem 1.75rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--surface);
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--transition-base);
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .option-btn:hover:not(.disabled) {
            border-color: var(--primary);
            background: var(--bg-secondary);
            transform: translateX(6px);
        }

        .option-letter {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: var(--gradient-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            flex-shrink: 0;
            transition: transform var(--transition-fast);
        }

        .option-btn:hover:not(.disabled) .option-letter {
            transform: scale(1.1);
        }

        .option-btn.correct {
            background: var(--success-bg);
            border-color: var(--success);
        }

        .option-btn.correct .option-letter {
            background: var(--gradient-success);
        }

        .option-btn.wrong {
            background: var(--error-bg);
            border-color: var(--danger);
        }

        .option-btn.wrong .option-letter {
            background: var(--gradient-danger);
        }

        .option-btn.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .explanation-box {
            margin-top: 2.25rem;
            padding: 1.75rem;
            border-radius: var(--radius-lg);
            background: var(--success-bg);
            border: 2px solid var(--success);
            display: none;
            animation: slideInUp 0.4s var(--transition-smooth);
        }

        .explanation-box.wrong {
            background: var(--error-bg);
            border-color: var(--danger);
        }

        .explanation-box .icon {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .explanation-box h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .explanation-box p {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .quiz-footer {
            padding: 1.75rem 2.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
        }

        .next-btn {
            padding: 1.1rem 2.75rem;
            border-radius: var(--radius-lg);
            background: var(--gradient-primary);
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition-base);
            display: none;
            box-shadow: var(--shadow-primary);
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(13, 148, 136, 0.25);
        }

        .loader {
            text-align: center;
            padding: 4rem 2rem;
        }

        .loader i {
            font-size: 3rem;
            color: var(--primary);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .loader p {
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .quiz-header {
                flex-direction: column;
                text-align: center;
                padding: 1.5rem;
                gap: 1rem;
            }

            .quiz-progress {
                text-align: center;
            }

            .quiz-body {
                padding: 1.75rem;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .option-btn {
                padding: 1.1rem 1.25rem;
                gap: 0.75rem;
            }

            .option-letter {
                width: 36px;
                height: 36px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <div class="quiz-info">
                <h1 id="topic-title">Đang tải...</h1>
                <p id="level-title">Trình độ: Tất cả</p>
            </div>
            <div class="quiz-progress">
                <span class="current" id="current-num">1</span>
                <span class="total"> / <span id="total-num">10</span></span>
            </div>
        </div>

        <div class="quiz-body">
            <div class="loader" id="loader">
                <i class="fa-solid fa-spinner fa-spin"></i>
                <p style="margin-top: 1rem; color: var(--text-muted);">Đang tải câu hỏi...</p>
            </div>

            <div id="quiz-content" style="display: none;">
                <div class="question-text" id="question-text">Câu hỏi sẽ hiển thị ở đây</div>

                <div class="options-grid" id="options-grid">
                    <!-- Options will be generated by JS -->
                </div>

                <div class="explanation-box" id="explanation-box">
                    <div class="icon" id="explanation-icon"></div>
                    <h3 id="explanation-title"></h3>
                    <p id="explanation-text"></p>
                </div>
            </div>
        </div>

        <div class="quiz-footer">
            <button class="next-btn" id="next-btn">
                Tiếp theo <i class="fa-solid fa-arrow-right" style="margin-left: 0.5rem;"></i>
            </button>
        </div>
    </div>

    <script>
        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let wrongAnswers = [];
        let answered = false;

        // Get URL params
        const params = new URLSearchParams(window.location.search);
        const topic = params.get('topic');
        const level = params.get('level');

        // Load questions
        async function loadQuestions() {
            try {
                let url = '/api/questions';
                if (topic || level) {
                    url += '?';
                    if (topic) url += `topic=${encodeURIComponent(topic)}&`;
                    if (level) url += `level=${encodeURIComponent(level)}&`;
                }

                const response = await fetch(url);
                questions = await response.json();

                if (questions.length === 0) {
                    document.getElementById('loader').innerHTML = '<p style="color: var(--accent-red);">Không có câu hỏi nào. Vui lòng quay lại và chọn chủ đề khác.</p>';
                    return;
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('quiz-content').style.display = 'block';

                document.getElementById('topic-title').textContent = topic || 'Trắc nghiệm';
                document.getElementById('level-title').textContent = level ? `Trình độ: ${level}` : 'Trình độ: Tất cả';
                document.getElementById('total-num').textContent = questions.length;

                showQuestion(0);
            } catch (error) {
                console.error('Error loading questions:', error);
                document.getElementById('loader').innerHTML = '<p style="color: var(--accent-red);">Lỗi tải dữ liệu. Vui lòng thử lại.</p>';
            }
        }

        function showQuestion(index) {
            answered = false;
            const question = questions[index];
            currentIndex = index;

            document.getElementById('current-num').textContent = index + 1;
            document.getElementById('question-text').textContent = question.question_text;
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = '';

            const letters = ['A', 'B', 'C', 'D'];
            const options = [
                { letter: 'A', text: question.option_a },
                { letter: 'B', text: question.option_b },
                { letter: 'C', text: question.option_c },
                { letter: 'D', text: question.option_d }
            ];

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-letter">${opt.letter}</span><span class="option-text">${opt.text}</span>`;
                btn.addEventListener('click', () => selectAnswer(opt.letter, question));
                optionsGrid.appendChild(btn);
            });
        }

        function selectAnswer(selected, question) {
            if (answered) return;
            answered = true;

            const correct = question.correct_option;
            const isCorrect = selected === correct;

            if (isCorrect) {
                score++;
            } else {
                wrongAnswers.push({
                    question: question,
                    selected: selected,
                    correct: correct
                });
            }

            // Highlight options
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.add('disabled');
                const letter = btn.querySelector('.option-letter').textContent;
                if (letter === correct) {
                    btn.classList.add('correct');
                } else if (letter === selected && !isCorrect) {
                    btn.classList.add('wrong');
                }
            });

            // Show explanation
            const explanationBox = document.getElementById('explanation-box');
            const icon = document.getElementById('explanation-icon');
            const title = document.getElementById('explanation-title');
            const text = document.getElementById('explanation-text');

            if (isCorrect) {
                explanationBox.className = 'explanation-box';
                icon.textContent = '✓';
                title.textContent = 'Chính xác!';
                title.style.color = 'var(--accent-green)';
            } else {
                explanationBox.className = 'explanation-box wrong';
                icon.textContent = '✗';
                title.textContent = 'Sai rồi!';
                title.style.color = 'var(--accent-red)';
            }

            text.textContent = question.explanation || 'Đáp án đúng là: ' + correct;
            explanationBox.style.display = 'block';

            // Show next button
            document.getElementById('next-btn').style.display = 'inline-block';
        }

        document.getElementById('next-btn').addEventListener('click', () => {
            if (currentIndex + 1 < questions.length) {
                showQuestion(currentIndex + 1);
            } else {
                // Show results
                const params = new URLSearchParams();
                params.set('score', score);
                params.set('total', questions.length);
                params.set('wrong', JSON.stringify(wrongAnswers));
                window.location.href = `/quiz/results?${params.toString()}`;
            }
        });

        // Load on ready
        loadQuestions();
    </script>
</body>
</html>
