<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập trắc nghiệm - LingoCards</title>    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% include '_head_fonts.html' %}

    <style>
        :root {
            --primary: #0D9488;
            --primary-dark: #0F766E;
            --primary-lighter: #F0FDFA;
            --secondary: #14B8A6;
            --gradient-primary: linear-gradient(135deg, #0D9488 0%, #14B8A6 100%);
            --shadow-primary: 0 10px 25px rgba(13, 148, 136, 0.2);
            --surface: #ffffff;
            --border: #E5E7EB;
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --text-muted: #9CA3AF;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 28px;
            --radius-full: 9999px;
            --transition-base: 0.2s ease;
            --transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
            background: #F9FAFB;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            margin-bottom: 3rem;
            animation: slideInDown 0.6s var(--transition-smooth);
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.65rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 1.75rem;
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-lg);
            background: var(--surface);
            border: 1px solid var(--border);
            transition: all var(--transition-base);
        }

        .back-link:hover {
            background: var(--primary-lighter);
            color: var(--primary);
            transform: translateX(-4px);
        }

        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.75rem;
            margin-bottom: 2rem;
        }

        .topic-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius-2xl);
            padding: 1.75rem;
            cursor: pointer;
            transition: all var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .topic-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity var(--transition-smooth);
        }

        .topic-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-lighter);
        }

        .topic-card:hover::before {
            opacity: 1;
        }

        .topic-icon {
            font-size: 2.75rem;
            margin-bottom: 1.25rem;
            color: var(--primary);
            transition: transform var(--transition-smooth);
        }

        .topic-card:hover .topic-icon {
            transform: scale(1.15) rotate(8deg);
        }

        .topic-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.65rem;
            color: var(--text-primary);
        }

        .topic-count {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .level-filter {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 1.75rem;
            margin-bottom: 2.5rem;
        }

        .level-filter-title {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 1.3rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .level-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .level-btn {
            padding: 0.8rem 1.75rem;
            border-radius: var(--radius-full);
            border: 2px solid var(--border);
            background: var(--surface);
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .level-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--primary);
            color: var(--primary);
        }

        .level-btn.active {
            background: var(--gradient-primary);
            border-color: var(--primary-dark);
            color: white;
            box-shadow: var(--shadow-primary);
        }

        .loader {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .loader i {
            font-size: 2.5rem;
            color: var(--primary);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .loader p {
            margin-top: 1rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 1.75rem;
            }

            .topics-grid {
                grid-template-columns: 1fr;
            }

            .level-buttons {
                flex-direction: column;
            }

            .level-btn {
                width: 100%;
                text-align: center;
            }
        }

        @media (max-width: 768px) {
            .app-container { padding: 1rem; }
            .page-title { font-size: 1.8rem; }
            .topics-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div style="display: flex; gap: 10px; margin-bottom: 1.5rem;">
                <a href="{{ url_for('index') }}" class="back-link" style="margin-bottom: 0;">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <span>Học tập</span>
                </a>
            </div>
            <h1 class="page-title">Ôn tập trắc nghiệm ngữ pháp</h1>
            <p class="page-subtitle">Chọn chủ đề và trình độ để bắt đầu luyện tập</p>
        </header>

        <div class="level-filter">
            <div class="level-filter-title">
                <i class="fa-solid fa-filter"></i> Trình độ
            </div>
            <div class="level-buttons" id="level-buttons">
                <button class="level-btn active" data-level="all">Tất cả</button>
                <button class="level-btn" data-level="Easy">Dễ</button>
                <button class="level-btn" data-level="Medium">Trung bình</button>
                <button class="level-btn" data-level="Hard">Khó</button>
            </div>
        </div>

        <div class="loader" id="loader">
            <i class="fa-solid fa-spinner fa-spin"></i>
            <p>Đang tải chủ đề...</p>
        </div>

        <div class="topics-grid hidden" id="topics-grid">
            <!-- Topics will be loaded by JS -->
        </div>
    </div>

    <script>
        let currentLevel = 'all';
        let topics = [];
        let questionCounts = {};

        // Load topics on page load
        async function loadTopics() {
            try {
                const [topicsRes, questionsRes] = await Promise.all([
                    fetch('/api/questions/topics'),
                    fetch('/api/questions')
                ]);

                topics = await topicsRes.json();
                const questions = await questionsRes.json();

                // Count questions per topic
                questionCounts = {};
                questions.forEach(q => {
                    if (q.topic) {
                        questionCounts[q.topic] = (questionCounts[q.topic] || 0) + 1;
                    }
                });

                renderTopics();
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('topics-grid').classList.remove('hidden');
            } catch (error) {
                console.error('Error loading topics:', error);
                document.getElementById('loader').innerHTML = '<p style="color: var(--accent-red);">Lỗi tải dữ liệu. Vui lòng thử lại.</p>';
            }
        }

        function renderTopics() {
            const grid = document.getElementById('topics-grid');
            grid.innerHTML = '';

            const icons = ['📝', '📚', '🎯', '💡', '🔍', '✏️', '📖', '🎓'];

            topics.forEach((topic, index) => {
                const count = questionCounts[topic] || 0;
                if (count === 0) return;

                const card = document.createElement('div');
                card.className = 'topic-card';
                card.innerHTML = `
                    <div class="topic-icon">${icons[index % icons.length]}</div>
                    <div class="topic-name">${topic}</div>
                    <div class="topic-count">${count} câu hỏi</div>
                `;
                card.addEventListener('click', () => startQuiz(topic, currentLevel));
                grid.appendChild(card);
            });

            if (grid.children.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted);"><i class="fa-solid fa-circle-info" style="font-size: 2rem; margin-bottom: 1rem; display: block;"></i><p>Chưa có câu hỏi nào. Vui lòng thêm câu hỏi trong trang Admin.</p></div>';
            }
        }

        function startQuiz(topic, level) {
            const params = new URLSearchParams();
            params.set('topic', topic);
            if (level !== 'all') {
                params.set('level', level);
            }
            window.location.href = `/quiz/take?${params.toString()}`;
        }

        // Level filter
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = btn.dataset.level;
            });
        });

        // Load on page ready
        loadTopics();
    </script>
</body>
</html>
